services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lexis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lexis}
      POSTGRES_DB: ${DB_NAME:-lexis}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lexis} -d ${DB_NAME:-lexis}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${DB_PORT_HOST:-5432}:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: lexis-backend:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lexis}
      DB_PASSWORD: ${DB_PASSWORD:-lexis}
      DB_NAME: ${DB_NAME:-lexis}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-lexis-jwt-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-168h}
      STORAGE_PATH: /app/storage/images
      RUN_SEEDS: ${RUN_SEEDS:-false}
    volumes:
      - backend-images:/app/storage/images

volumes:
  db-data:
  backend-images:
